<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SpareMeal – My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#F7F4F0;padding-bottom:90px;}
    .top{display:flex;flex-direction:column;align-items:center;padding:32px 20px 16px;background:linear-gradient(180deg,#FFF0EB,#F7F4F0);}
    .av{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#FF6B35,#E85A24);color:white;font-size:32px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-bottom:12px;box-shadow:0 8px 22px rgba(255,107,53,.35);}
    .top h2{font-family:'Playfair Display',serif;font-size:21px;margin-bottom:3px;}
    .top p{color:#888;font-size:13px;}
    .str{display:flex;justify-content:center;gap:12px;padding:4px 16px 18px;}
    .stt{background:white;border-radius:14px;padding:12px 18px;text-align:center;box-shadow:0 3px 14px rgba(0,0,0,.07);}
    .stt strong{display:block;font-size:20px;font-weight:800;color:#FF6B35;} .stt small{font-size:11px;color:#888;}
    .sec{padding:18px 16px 4px;}
    .sec h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:14px;}
    .live{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:#22C55E;margin-left:8px;vertical-align:middle;}
    .ldot{width:7px;height:7px;border-radius:50%;background:#22C55E;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.5);opacity:.7;}}
    .notif{background:#EBF9F1;border:1.5px solid #6EE7B7;border-radius:12px;padding:11px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px;font-size:13px;color:#065F46;}
    .notif .ni{font-size:20px;flex-shrink:0;margin-top:1px;}
    .ac{background:white;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 3px 14px rgba(0,0,0,.07);}
    .ac-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
    .ac-ngo{font-size:14px;font-weight:700;color:#FF6B35;}
    .ac-date{font-size:11px;color:#aaa;}
    .ac-meta{font-size:12px;color:#666;margin-bottom:10px;line-height:1.8;}
    .dtag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:10px;}
    .del-pu{background:#FFF0EB;color:#FF6B35;} .del-sd{background:#EFF6FF;color:#3B82F6;}
    .srow{border-top:1px solid #F0EBE5;padding-top:10px;display:flex;align-items:center;gap:8px;}
    .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .dot-pending{background:#F59E0B;}
    .dot-accepted{background:#22C55E;animation:pulse 1.5s infinite;}
    .dot-completed{background:#3B82F6;}
    .dot-rejected{background:#EF4444;}
    .stxt{font-size:13px;font-weight:700;}
    .s-pending{color:#B45309;} .s-accepted{color:#065F46;} .s-completed{color:#1D4ED8;} .s-rejected{color:#B91C1C;}
    .ssub{font-size:11px;color:#888;margin-left:auto;}
    .empty{text-align:center;padding:36px 20px;color:#aaa;}
    .empty .ei{font-size:48px;margin-bottom:10px;} .empty p{font-size:14px;}
    .ic{background:white;border-radius:16px;margin:0 16px 18px;box-shadow:0 3px 14px rgba(0,0,0,.07);overflow:hidden;}
    .ir{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid #E8E0D8;}
    .ir:last-child{border-bottom:none;}
    .ir .ico{font-size:20px;flex-shrink:0;}
    .ir small{display:block;font-size:11px;color:#888;margin-bottom:2px;} .ir p{font-size:14px;font-weight:600;}
    .btn-so{display:block;width:calc(100% - 32px);margin:0 16px;background:transparent;color:#E85A24;border:2px solid #E85A24;padding:13px;border-radius:14px;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:center;}
    .btn-so:hover{background:#FFF0EB;}
    .bnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E8E0D8;display:flex;padding:8px 0 12px;z-index:100;}
    .nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'DM Sans',sans-serif;font-size:11px;color:#888;text-decoration:none;padding:4px 0;}
    .nb.on,.nb:hover{color:#FF6B35;} .nb .ni{font-size:20px;}
  </style>
</head>
<body>

<div class="top">
  <div class="av" id="av"></div>
  <h2 id="pname"></h2>
  <p>@<span id="puser"></span></p>
</div>

<div class="str">
  <div class="stt"><strong id="sc-d">—</strong><small>Donations</small></div>
  <div class="stt"><strong id="sc-m">—</strong><small>Meals</small></div>
  <div class="stt"><strong id="sc-c">—</strong><small>Completed</small></div>
</div>

<div class="sec">
  <h3>🔔 My Activity <span class="live"><span class="ldot"></span>Live</span></h3>
  <div id="notif-area"></div>
  <div id="act-list"><p style="color:#aaa;text-align:center;padding:24px;font-size:13px;">Connecting…</p></div>
</div>

<div class="sec" style="margin-top:6px;"><h3>Account</h3></div>
<div class="ic">
  <div class="ir"><span class="ico">👤</span><div><small>Full Name</small><p id="ir-n"></p></div></div>
  <div class="ir"><span class="ico">🏷️</span><div><small>Username</small><p id="ir-u"></p></div></div>
  <div class="ir"><span class="ico">🎭</span><div><small>Role</small><p>Donor</p></div></div>
</div>
<button class="btn-so" onclick="signOut()">Sign Out</button>

<nav class="bnav">
  <a href="home.html"    class="nb"><span class="ni">🏠</span>Home</a>
  <a href="donate.html"  class="nb"><span class="ni">🤲</span>Donate</a>
  <a href="profile.html" class="nb on"><span class="ni">👤</span>Profile</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  if (getSession('role') !== 'donor') { location.href = 'index.html'; }

  var cu = getSession('cu');
  var cn = getSession('cn') || 'Friend';

  document.getElementById('av').textContent    = cn.charAt(0).toUpperCase();
  document.getElementById('pname').textContent = cn;
  document.getElementById('puser').textContent = cu;
  document.getElementById('ir-n').textContent  = cn;
  document.getElementById('ir-u').textContent  = cu;

  var stMap = {
    pending:  { dot:'dot-pending',   cls:'s-pending',   txt:'⏳ Pending',         sub:'Waiting for NGO'   },
    accepted: { dot:'dot-accepted',  cls:'s-accepted',  txt:'✅ Accepted by NGO', sub:'NGO confirmed! 🎉' },
    completed:{ dot:'dot-completed', cls:'s-completed', txt:'🎉 Completed',        sub:'Food delivered!'   },
    rejected: { dot:'dot-rejected',  cls:'s-rejected',  txt:'❌ Rejected',         sub:'Request declined'  }
  };

  // ── Real-time listener (no orderBy → no index needed) ──
  DONATIONS
    .where('donorUser', '==', cu)
    .onSnapshot(
      function(snap) {
        var dons = [];
        snap.forEach(function(doc) {
          dons.push(Object.assign({ id: doc.id }, doc.data()));
        });

        // Sort newest first on client
        dons = sortByDate(dons);

        // Stats
        var meals = 0, done = 0;
        dons.forEach(function(d) {
          meals += parseInt(d.qty) || 0;
          if (d.status === 'completed') done++;
        });
        document.getElementById('sc-d').textContent = dons.length;
        document.getElementById('sc-m').textContent = meals;
        document.getElementById('sc-c').textContent = done;

        // Accepted notifications
        var accepted = dons.filter(function(d) { return d.status === 'accepted'; });
        document.getElementById('notif-area').innerHTML = accepted.map(function(d) {
          return '<div class="notif"><span class="ni">✅</span><span>' +
            '<b>' + d.ngoName + '</b> accepted your donation of <b>' + d.qty + ' meals</b>! ' +
            (d.delivery === 'Pick-Up'
              ? 'They will come to collect it.'
              : 'Please deliver at your scheduled time.') +
            '</span></div>';
        }).join('');

        // Activity cards
        if (dons.length === 0) {
          document.getElementById('act-list').innerHTML =
            '<div class="empty"><div class="ei">🍽️</div><p>No donations yet. Donate some food!</p></div>';
          return;
        }

        document.getElementById('act-list').innerHTML = dons.map(function(d) {
          var s    = stMap[d.status] || stMap.pending;
          var dCls = d.delivery === 'Pick-Up' ? 'del-pu' : 'del-sd';
          var dIco = d.delivery === 'Pick-Up' ? '📦' : '🛵';
          var dateStr = d.pickupDate
            ? d.pickupDate + (d.pickupTime ? ' at ' + d.pickupTime : '')
            : '—';
          return '<div class="ac">' +
            '<div class="ac-top">' +
              '<span class="ac-ngo">' + d.ngoName + '</span>' +
              '<span class="ac-date">' + dateStr + '</span>' +
            '</div>' +
            '<div class="ac-meta">' +
              '🥗 ' + d.category + ' · ' + d.meal + ' · 👥 ' + d.qty + ' persons' +
              (d.hrsAgo > 0 ? ' · 🕐 ' + d.hrsAgo + ' hrs ago' : '') +
              '<br>📍 ' + d.addr +
            '</div>' +
            '<span class="dtag ' + dCls + '">' + dIco + ' ' + d.delivery + '</span>' +
            '<div class="srow">' +
              '<div class="dot ' + s.dot + '"></div>' +
              '<span class="stxt ' + s.cls + '">' + s.txt + '</span>' +
              '<span class="ssub">' + s.sub + '</span>' +
            '</div>' +
            '</div>';
        }).join('');
      },
      function(err) {
        console.error('Firestore error:', err);
        document.getElementById('act-list').innerHTML =
          '<div class="empty"><p>⚠️ Could not load: ' + err.message + '</p></div>';
      }
    );

  function signOut() { clearSession(); location.href = 'index.html'; }
</script>
</body>
</html>
