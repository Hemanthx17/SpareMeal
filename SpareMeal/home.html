<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SpareMeal – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:#F7F4F0;padding-bottom:80px;}
    .hdr{background:linear-gradient(135deg,#FF6B35,#E85A24);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;}
    .hl{display:flex;align-items:center;gap:10px;}
    .hbrand{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:white;}
    .greet{color:rgba(255,255,255,.9);font-size:13px;}
    .search{background:white;margin:14px 14px 4px;border-radius:14px;display:flex;align-items:center;gap:10px;padding:12px 16px;box-shadow:0 4px 14px rgba(0,0,0,.07);}
    .search input{border:none;outline:none;font-size:14px;flex:1;font-family:'DM Sans',sans-serif;}
    .sec{padding:18px 14px 4px;}
    .sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
    .sh h3{font-size:16px;font-weight:700;} .sh a{font-size:13px;color:#FF6B35;font-weight:600;text-decoration:none;}
    .chips{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
    .chips::-webkit-scrollbar{display:none;}
    .chip{flex-shrink:0;width:70px;text-align:center;text-decoration:none;color:#1A1A1A;}
    .chi{width:60px;height:60px;border-radius:50%;margin:0 auto 5px;background:#FFF0EB;border:2px solid #E8E0D8;display:flex;align-items:center;justify-content:center;font-size:22px;transition:transform .2s;}
    .chi:hover{transform:scale(1.08);}
    .chip span{font-size:11px;font-weight:600;color:#555;}
    .nc{background:white;border-radius:14px;padding:13px;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:0 3px 14px rgba(0,0,0,.07);text-decoration:none;color:inherit;cursor:pointer;transition:transform .15s;}
    .nc:hover{transform:translateY(-2px);}
    .nico{width:54px;height:54px;border-radius:12px;background:#FFF0EB;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
    .nf{flex:1;} .nf h4{font-size:14px;font-weight:700;color:#FF6B35;margin-bottom:3px;} .nf p{font-size:12px;color:#666;}
    .na{width:30px;height:30px;background:#FF6B35;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:13px;flex-shrink:0;}
    .cr{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
    .cr::-webkit-scrollbar{display:none;}
    .cc{flex-shrink:0;width:165px;height:100px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;}
    .cc .ce{font-size:28px;} .cc .ct{color:white;font-size:11px;font-weight:700;text-align:center;padding:0 8px;}
    .bnav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #E8E0D8;display:flex;padding:8px 0 12px;z-index:100;}
    .nb{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:'DM Sans',sans-serif;font-size:11px;color:#888;text-decoration:none;padding:4px 0;}
    .nb.on,.nb:hover{color:#FF6B35;} .nb .ni{font-size:20px;}
  </style>
</head>
<body>

<div class="hdr">
  <div class="hl">
    <svg width="36" height="36" viewBox="0 0 56 56" fill="none">
      <circle cx="28" cy="28" r="27" fill="rgba(255,255,255,.18)" stroke="rgba(255,255,255,.28)" stroke-width="1.5"/>
      <rect x="13" y="6" width="4" height="11" rx="2" fill="white" opacity=".7"/>
      <rect x="20" y="3" width="4" height="14" rx="2" fill="white"/>
      <rect x="28" y="3" width="4" height="14" rx="2" fill="white"/>
      <rect x="36" y="6" width="4" height="11" rx="2" fill="white" opacity=".7"/>
      <rect x="7" y="22" width="42" height="8" rx="4" fill="white"/>
      <path d="M10 30 Q9 44 28 49 Q47 44 46 30 Z" fill="white"/>
      <rect x="9" y="22" width="38" height="5" rx="2.5" fill="rgba(255,255,255,.3)"/>
      <ellipse cx="37" cy="38" rx="5.5" ry="3" fill="rgba(255,255,255,.2)" transform="rotate(-15 37 38)"/>
    </svg>
    <span class="hbrand">SpareMeal</span>
  </div>
  <div class="greet" id="greet">Hello 👋</div>
</div>

<div class="search"><span>🔍</span><input placeholder="Search NGO or campaign…"/></div>

<div class="sec">
  <div class="sh"><h3>Volunteer Required</h3><a href="donate.html">See all →</a></div>
  <div class="chips" id="vr"></div>
</div>

<div class="sec">
  <div class="sh"><h3>Food Required</h3><a href="donate.html">See all →</a></div>
  <div id="fl"></div>
</div>

<div class="sec">
  <div class="sh"><h3>Campaigns</h3><a href="#">See all →</a></div>
  <div class="cr">
    <div class="cc" style="background:#FF6B35;"><div class="ce">🍱</div><div class="ct">Meal Donation Drive</div></div>
    <div class="cc" style="background:#22C55E;"><div class="ce">📦</div><div class="ct">Food Donation Month</div></div>
    <div class="cc" style="background:#EC4899;"><div class="ce">🌾</div><div class="ct">Don't Waste, Donate</div></div>
  </div>
</div>

<div class="sec">
  <div class="sh"><h3>Nearby NGOs</h3><a href="donate.html">See all →</a></div>
  <div class="chips" id="nr"></div>
</div>

<nav class="bnav">
  <a href="home.html"    class="nb on"><span class="ni">🏠</span>Home</a>
  <a href="donate.html"  class="nb"><span class="ni">🤲</span>Donate</a>
  <a href="profile.html" class="nb"><span class="ni">👤</span>Profile</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  if (getSession('role') !== 'donor') { location.href = 'index.html'; }

  var nm = getSession('cn') || 'Friend';
  document.getElementById('greet').textContent = 'Hello, ' + nm.split(' ')[0] + ' 👋';

  NGO_LIST.forEach(function(n, i) {
    document.getElementById('vr').innerHTML +=
      '<a href="donate.html?id='+n.id+'" class="chip"><div class="chi">'+n.emoji+'</div><span>'+n.name.split(' ')[0]+'</span></a>';
    if (i < 3)
      document.getElementById('fl').innerHTML +=
        '<a href="donate.html?id='+n.id+'" class="nc"><div class="nico">'+n.emoji+'</div>' +
        '<div class="nf"><h4>'+n.name+'</h4><p>🍽 '+n.meals+' meals · ⏰ '+n.hours+'</p></div>' +
        '<div class="na">→</div></a>';
    if (i >= 2)
      document.getElementById('nr').innerHTML +=
        '<a href="donate.html?id='+n.id+'" class="chip"><div class="chi">'+n.emoji+'</div><span>'+n.name.split(' ')[0]+'</span></a>';
  });
</script>
</body>
</html>
